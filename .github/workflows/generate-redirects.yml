name: Generate Redirects

on:
  pull_request:
    branches:
      - main
concurrency:
  group: ${{ github.ref }}-workflow
  cancel-in-progress: false

jobs:
  generate_redirects:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch all history for all branches and tags for pull_request events
          # to correctly identify changed files. For workflow_dispatch, a shallow clone is fine.
          fetch-depth: 0
          token: ${{ secrets.DWARVES_PAT }}
          submodules: recursive

      - name: Install devbox
        uses: jetpack-io/devbox-install-action@v0.12.0
        with:
          enable-cache: true
          devbox-version: 0.14.2
      
      - name: Checkout submodules
        run: |
          git checkout ${{ github.head_ref }} || echo "WARN: Failed to checkout in parent repository. Proceeding with current branch."
          git submodule foreach '
            echo "Processing L1 submodule: $name ($path)"
            git checkout -b chore/ci-redirects || git checkout chore/ci-redirects || echo "WARN: Failed to checkout chore/ci-redirects in L1 submodule $name, attempting push on current state"
            # Process Level 2 submodules (submodules of the current L1 submodule)
            # This command is executed from within the L1 submodule directory
            # Wrapped in a subshell to catch errors from the inner foreach
            (git submodule foreach '\''
              echo "  Processing L2 submodule: $name ($path)"
              git checkout -b chore/ci-redirects || git checkout chore/ci-redirects || echo "  WARN: Failed to checkout chore/ci-redirects in L2 submodule $name, attempting push on current state"
            '\'' || echo "WARN: Inner foreach for L2 in L1 submodule $name ($path) encountered an issue. Continuing...")
          ' || echo "WARN: Outer foreach for L1 submodules encountered an issue. Attempting to process parent repo."
  
      - name: Build redirects
        run: devbox run build-redirects

      - name: Commit and push changes
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          # Process Level 1 submodules
          git submodule foreach '
            echo "Processing L1 submodule: $name ($path)"
            git add --all
            git commit -m "chore(ci): redirects" || echo "INFO: No changes to commit in L1 submodule $name"
            git push --set-upstream origin chore/ci-redirects || git push || echo "WARN: Failed to push L1 submodule $name. Continuing..."
            # Process Level 2 submodules (submodules of the current L1 submodule)
            # This command is executed from within the L1 submodule directory
            # Wrapped in a subshell to catch errors from the inner foreach
            (git submodule foreach '\''
              echo "  Processing L2 submodule: $name ($path)"
              git add --all
              git commit -m "chore(ci): redirects" || echo "  INFO: No changes to commit in L2 submodule $name"
              git push --set-upstream origin chore/ci-redirects || git push || echo "  WARN: Failed to push L2 submodule $name. Continuing..."
            '\'' || echo "WARN: Inner foreach for L2 in L1 submodule $name ($path) encountered an issue. Continuing...")
          ' || echo "WARN: Outer foreach for L1 submodules encountered an issue. Attempting to process parent repo."
          # Commit and push changes in the parent repository
          git add --all
          git commit -m "chore(ci): redirects" || echo "INFO: No changes to commit in parent repository"
          git push || echo "WARN: Failed to push parent repository."
